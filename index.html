<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>KIMPVIEW | 김치프리미엄 김프</title>

  <meta name="description" content="실시간 김치프리미엄, 비트코인·이더리움 가격 비교 사이트 KIMPVIEW">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">

  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="topMetrics">
    <div class="topMetricsInner">
      <span>환율(원): <strong id="fxKRW">-</strong></span>
      <span>테더(USDT): <strong id="usdtKRW">-</strong></span>
      <span>도미넌스: <strong id="btcDominance">-</strong></span>
      <span>코인베이스 프리미엄: <strong id="cbPremium">계산중</strong></span>
      <span>시가총액: <strong id="totalMcap">-</strong></span>
      <span>24시간 거래량: <strong id="totalVolume">-</strong></span>
    </div>
  </div>

  <div class="wrap">

    <header class="topbar">
      <div class="headerLeft">
        <h1 class="logo">KIMPVIEW</h1>
        <nav class="topnav">
          <a href="#">코인</a>
          <a href="#">통계&지표</a>
          <a href="#">주식</a>
          <a href="#">뉴스</a>
          <a href="#">환율계산기</a>
        </nav>
      </div>
    </header>

    <div class="layout">

      <main class="main">

        <a href="#" class="mainBanner">
          <img src="images/main_banner.png" alt="메인 프로모션 배너">
        </a>

        <div class="chartBox" id="chartBox">
          <div class="tradingview-widget-container" style="height:100%;width:100%;">
            <div id="tv_btcusdt" style="height:100%;width:100%;"></div>
          </div>
        </div>

        <hr>

        <div class="controlsBar">
          <select id="exchangeSelect">
            <option value="upbit_krw">업비트 KRW</option>
            <option value="bithumb_krw">빗썸 KRW</option>
            <option value="coinone_krw">코인원 KRW</option>
          </select>

          <input id="searchInput" type="text" placeholder="코인명">
          <input id="applyBtn" type="button" value="검색">
          <button id="clearSearchBtn" type="button" style="display:none;">✕</button>

          <div class="favTop favTop--inline">
            <span>즐겨찾기 코인만 보기</span>
            <label class="switch switch--gold">
              <input type="checkbox" id="favoriteOnlyInline">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- ✅ inline chart host는 table 밖으로 이동 -->
        <div id="inlineChartHost" style="display:none;">
          <div class="inlineChartHeader">
            <span id="inlineChartTitle"></span>
            <a id="inlineChartLink" target="_blank">TradingView</a>
          </div>
          <div id="inlineChartBox"></div>
        </div>

        <div class="tableWrap">
          <table class="table marketTable">
            <colgroup>
              <col class="col-coin">
              <col class="col-price">
              <col class="col-ch24">
              <col class="col-vol">
              <col class="col-mcap">
              <col class="col-kimp">
            </colgroup>

            <thead>
              <tr>
                <th class="sortable th-coin" data-sort="name"><span class="thLabel">코인명</span></th>
                <th class="sortable" data-sort="priceKRW"><span class="thLabel">현재가</span></th>
                <th class="sortable" data-sort="change24h"><span class="thLabel">24H</span></th>
                <th class="sortable" data-sort="volKRW"><span class="thLabel">거래대금</span></th>
                <th class="sortable" data-sort="mcapKRW"><span class="thLabel">시가총액</span></th>
                <th class="sortable" data-sort="kimp"><span class="thLabel">김프</span></th>
              </tr>
            </thead>

            <tbody id="coinTableBody"></tbody>
          </table>
        </div>

      </main>

      <aside class="side">

        <div class="banner">
          <img src="images/banner_kimpview.png" alt="KIMPVIEW 배너">
        </div>

        <section class="marketStatus">
          <h3>시장 현황</h3>
          <table class="card">
            <tr><td>롱 비율</td><td id="longRate">-</td></tr>
            <tr><td>숏 비율</td><td id="shortRate">-</td></tr>
            <tr><td>공포·탐욕</td><td id="fearGreed">-</td></tr>
          </table>
        </section>

        <section>
          <h3>거래 알림</h3>
          <table class="card alertTable">
            <thead>
              <tr><th>구분</th><th>금액</th><th>체결가</th><th>시간</th></tr>
            </thead>
            <tbody id="tradeAlertBody"></tbody>
          </table>
        </section>

        <section>
          <h3>청산 알림</h3>
          <table class="card alertTable">
            <thead>
              <tr><th>구분</th><th>금액</th><th>체결가</th><th>시간</th></tr>
            </thead>
            <tbody id="liquidAlertBody"></tbody>
          </table>
        </section>

      </aside>

    </div>
  </div>

  <script src="app.js"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script src="tv-init.js"></script>
</body>
</html>
